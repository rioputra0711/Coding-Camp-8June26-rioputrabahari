<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">nyinyo</span>
            </div>
            <button id="themeToggle" class="btn-theme">
                <span class="theme-icon">🌙</span>
                <span class="theme-label">Dark</span>
            </button>
        </header>

        <section class="hero-stat">
            <div class="stat-eyebrow">TOTAL SPENT</div>
            <div class="stat-amount" id="totalBalance">0</div>
            <div class="stat-sub" id="txCount">No transactions yet</div>
        </section>

        <div class="main-grid">
            <!-- Form -->
            <section class="form-section card">
                <h3 class="section-title">New Transaction</h3>
                <div class="form-group">
                    <label for="itemName">What did you spend on?</label>
                    <input type="text" id="itemName" placeholder="e.g. Cilok, Grab, Netflix…">
                </div>
                <div class="form-group">
                    <label for="amount">Amount (Rp)</label>
                    <div class="input-prefix-wrap">
                        <span class="input-prefix"></span>
                        <input type="number" id="amount" step="1" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category"></select>
                </div>
                <div class="form-group inline-group">
                    <input type="text" id="newCategory" placeholder="Add new category…">
                    <button type="button" id="addCategoryBtn" class="btn-ghost">＋</button>
                </div>
                <button id="submitBtn" class="btn-primary">Add Transaction</button>
            </section>

            <!-- Data -->
            <div class="data-col">
                <section class="card chart-card">
                    <h3 class="section-title">Spending Breakdown</h3>
                    <div class="chart-wrap">
                        <canvas id="expenseChart"></canvas>
                        <div class="chart-center-label">
                            <span id="chartCenterVal"></span>
                            <span id="chartCenterSub">categories</span>
                        </div>
                    </div>
                </section>

                <section class="card transactions-card">
                    <div class="list-header">
                        <h3 class="section-title" style="margin-bottom:0">Transactions</h3>
                        <select id="sortSelect" class="sort-select">
                            <option value="newest">Newest</option>
                            <option value="highest">Highest</option>
                            <option value="lowest">Lowest</option>
                            <option value="category">Category</option>
                        </select>
                    </div>
                    <ul id="transactionList" class="transaction-list"></ul>
                    <div class="empty-state" id="emptyState">
                        <span class="empty-icon"></span>
                        <p>No transactions yet.<br>Add your first one!</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
